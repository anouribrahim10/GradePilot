name: Test Suite (Session 7)

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - session-7-tests
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit + integration tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: htmlcov/
          retention-days: 7

      - name: Upload coverage report (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml
          retention-days: 7

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://e2e.example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: e2e-anon-key
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8000

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build

      - name: Run Playwright E2E test
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
