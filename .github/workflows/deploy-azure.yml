name: Deploy (Azure Container Apps)

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile.api'
      - 'pyproject.toml'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-main
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP: gradepilot-sushanta-rg
  AZURE_ACR_NAME: gradepilotsushantaacr
  AZURE_CONTAINER_APP: gradepilot-api
  IMAGE_NAME: gradepilot-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${AZURE_ACR_NAME}"

      - name: Build and push image
        run: |
          IMAGE="${AZURE_ACR_NAME}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST="${AZURE_ACR_NAME}.azurecr.io/${IMAGE_NAME}:latest"
          docker build -f Dockerfile.api -t "${IMAGE}" -t "${LATEST}" .
          docker push "${IMAGE}"
          docker push "${LATEST}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Update Container App to new image
        run: |
          az containerapp update \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE}"

      - name: Show service URL
        run: |
          FQDN=$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Service URL: https://${FQDN}"
